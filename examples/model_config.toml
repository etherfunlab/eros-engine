# `model` accepts three forms (task-level and per-tier):
#   model = "id"                       # fixed
#   model = ["id_a", "id_b"]           # round-robin (deterministic alternation)
#   model = { "id_a" = 0.8, "id_b" = 0.2 }  # weighted random (normalized by sum)
# Weighted-table keys must be quoted (model ids contain "/" and ".").
# If the selected primary also appears in `fallback`, it is auto-skipped.

# ── Global defaults (optional) ───────────────────────────────────────────────
# Cross-task settings. `ignore_providers` excludes OpenRouter provider slugs
# from routing on EVERY task (issue #84: one provider returned undecoded
# byte-level-BPE text for thedrummer/cydonia-24b-v4.1). Sent as provider.ignore
# on every call; allow_fallbacks stays true so the model is still served by a
# healthy provider. Find the offending slug via OpenRouter's generation API.
# Empty/unset = no exclusion.
#
# `provider_sort` (optional) sets OpenRouter's provider routing sort on EVERY
# task: "price" | "throughput" | "latency". Unset (default) keeps OpenRouter's
# price-based load balancing. Setting it trades cost for the chosen axis —
# "latency" favours TTFT for chat; note it disables price load-balancing, so
# watch cost and success rate separately.
#[defaults]
#ignore_providers = ["some-bad-provider-slug"]
#provider_sort = "latency"
#
# One-off repair of rows already persisted with byte-BPE garble (run manually,
# NOT a migration — the engine refuses to own downstream prod data). Repairs the
# two unambiguous whitespace glyphs only (Ġ→space, Ċ→newline), idempotent,
# touches only rows that still contain a glyph:
#   supabase db query --linked "UPDATE engine.chat_messages
#     SET content = replace(replace(content,'Ġ',' '),'Ċ',E'\n')
#     WHERE content ~ '[ĠĊ]';"
#   supabase db query --linked "UPDATE engine.chat_messages
#     SET pre_filter_content = replace(replace(pre_filter_content,'Ġ',' '),'Ċ',E'\n')
#     WHERE pre_filter_content ~ '[ĠĊ]';"

[tasks.chat_companion]
# Example chat primary. deepseek-v4-flash is a cheap, fast, permissive
# default — swap in whatever suits your product. The first fallback (Cydonia)
# is roleplay-tuned so a primary outage doesn't make the companion prudish;
# glm-4.7-flash is a fast, reliable last resort.
# `fallback` accepts either a single string (legacy) or an array of model
# ids in preference order. The chain is tried sequentially; first success
# wins. An explicit empty value (`""` or `[]`) opts out of the defaults
# block's fallback for this task.
# Recommendation: keep `fallback` to at most 2 entries. The streaming chat
# burst caps attempts at MAX_STREAM_FALLBACK_DEPTH (3 = primary + 2 fallbacks);
# anything past the third entry is never tried on the chat path.
model = "deepseek/deepseek-v4-flash"
fallback = ["thedrummer/cydonia-24b-v4.1", "z-ai/glm-4.7-flash"]
temperature = 0.8
# Sampling knobs (chat task only — extraction/vision/affinity want determinism
# and leave these unset). These ship as the OSS default; a deployment opts out
# by removing them. top_p trims the long tail; the two penalties are the
# portable repetition levers (we deliberately do NOT use repetition_penalty —
# it is provider-inconsistent and distorts CJK at the useful range).
top_p = 0.9
frequency_penalty = 0.4
presence_penalty = 0.2
max_tokens = 1600
# Companion replies only render `content`; the reasoning channel is ignored,
# so disable it to save latency/cost. Same shape as OpenRouter's `reasoning`
# object — set `{ exclude = true }` instead if you want it generated but hidden.
# Inherited by every tier below.
reasoning = { enabled = false }
# Controls the `model` value sent to clients in chat `meta` frames. Affects ONLY
# the client display — never the OpenRouter call or the persisted row. Omit this
# line and the field defaults to `false` (the model name is NOT sent). Four forms:
#   model_name_display_override = false               # omit model from meta
#   model_name_display_override = true                # send the real model id (this line)
#   model_name_display_override = "Aria"              # always show "Aria"
#   model_name_display_override = ["Aria", "Nova"]    # random per bubble
#   model_name_display_override = { "deepseek/deepseek-v4-flash" = "Aria", default = "Companion" }
# Map keys must be quoted (ids contain "/" and "."); the bareword `default` key
# is the fallback when the real id isn't listed (no default ⇒ omit). Task-level;
# every tier inherits it.
model_name_display_override = true
# Optional prompt-trait allow-list (three-state). Commented out here means no
# gating. See docs/prompt-traits.md.
#allow_traits = ["nsfw_boost","politics_open"]

# Per-tier overrides are OPTIONAL and downstream-defined: `tier` is whatever
# your product sends per request. The OSS template enables none — with no tier
# (or an unknown one) the task default block above is used. Uncomment and adapt
# these as a starting point, or define your own. A tier may override
# model / fallback / allow_traits; `model` here also accepts the array
# (round-robin) and table (weighted) forms shown at the top of this file.
#[tasks.chat_companion.tiers.free]
#model        = "z-ai/glm-4.5-air"
#fallback     = ["thedrummer/cydonia-24b-v4.1","z-ai/glm-4.7-flash"]
#allow_traits = ["politics_open"]

#[tasks.chat_companion.tiers.plus]
#model        = "x-ai/grok-4.20"
#fallback     = ["thedrummer/cydonia-24b-v4.1", "x-ai/grok-4.3"]
#allow_traits = ["nsfw_boost", "politics_open"]

# (belongs to the [tasks.chat_companion] table above)
# Deterministic per-model regex strips for the assistant reply. Task-level only
# (no per-tier override). Each rule deletes (or replaces) matches in replies
# produced by any model in `models`. Applied BEFORE the client sees the reply,
# before any LLM output_filter, and before memory/insight/affinity extract — so
# the matched text reaches neither the client nor the stored history/memory. The
# raw reply is kept on the row's pre_filter_content (filter_model = "<regex>").
# Uses the Rust `regex` crate: NO lookaround/backreferences — anchor with $, ^,
# \s*, char classes. An invalid pattern fails server boot.
# output_regex = [
#   # Strip L3.3-Euryale's self-narrated photo line on reply_text_image turns.
#   { models = ["sao10k/l3.3-euryale-70b"],
#     pattern = '\s*\[你给对方发送了一张照片[：:][^\]]*\]\s*$' },
#   # { models = ["x/y"], pattern = '...', replacement = "…" },  # replacement default "" = delete
# ]

# ── Optional output filter (OFF by default) ──────────────────────────────
# Rewrites the chat reply through a second LLM before the client sees it.
# Enable per-tier (or globally) with `output_filter` on [tasks.chat_companion]:
#   [tasks.chat_companion]
#   output_filter = true                 # global default (default: false)
#   [tasks.chat_companion.tiers.gold]
#   output_filter = true                 # per-tier; overrides the global default
#
# The filter only runs if BOTH output_filter is true AND this table exists with
# a non-blank filter_prompt; otherwise it is inert. Only the FILTERED text is
# shown/stored; extract (memory/insight/affinity) reads the original by default.
#
# ── Recommended models for chat_output_filter ────────────────────────────
# Primary: openai/gpt-5.4-nano — fast, stable filtered output.
#
# DO NOT use openai/gpt-4.1-nano as the filter model — it empirically returns
# "对不起，无法满足你的要求"-style refusals with HTTP 200, which the engine
# cannot distinguish from a successful filtered rewrite, so the fail-open path
# never triggers and the user sees the refusal text.
#
# Recommended fallback: google/gemini-3.1-flash — high success rate; when it
# does fail it surfaces a proper error response (non-200), letting the engine's
# fail-open path kick in and emit the original reply.
#
# Cost-saving fallback: zhipuai/zlm-4.7-flash — cheaper, similar fail-mode
# profile to gemini-3.1-flash.
#
# DO NOT use anthropic/claude-haiku-4.5 for the filter — its input tolerance
# for NSFW (great for extraction) does NOT extend to output; the safety
# alignment on the output side is strict enough that the filter LLM often
# refuses to produce rewritten text at all.
#[tasks.chat_output_filter]
#model        = "openai/gpt-5.4-nano"
#fallback     = ["google/gemini-3.1-flash", "zhipuai/zlm-4.7-flash"]
#retry_depth  = 1     # fallbacks to try on filter failure; default 1 (primary + first fallback)
#temperature  = 0.3
#max_tokens   = 400
#filter_prompt = """
#Rewrite the assistant reply below per <your policy>. Output only the rewrite.
#"""
# trigger: AND of the predicates you specify; omit all ⇒ filter every turn.
# `traits` matches the tags ACTUALLY injected (after tier allow_traits gating),
# i.e. the same set reported in the final frame's prompt_injected.
#trigger      = { random = 0.3, models = ["x/y"], traits = { any = ["nsfw_boost"], when = "present" } }
#timing       = "after_extract"   # or "before_extract"
#[tasks.chat_output_filter.tiers.gold]
# per-tier may override model/fallback/retry_depth/filter_prompt/trigger/timing
# (NOT temperature/max_tokens — those are task-level only, like every other task)
#filter_prompt = "..."

# ── Optional user-input rewrite filter (OFF by default) ──────────────────────
# Rewrites a MEANINGLESS user turn (e.g. "1111", "？？？", key-mashing) into one
# natural, context-appropriate user message before it reaches chat_companion, so
# the companion answers a real message instead of parroting history. Meaningful
# turns — including short ones like "嗯"/"好啊"/"在吗" and genuine short
# questions — are left untouched.
#
# Enable with a single global switch on [tasks.chat_companion]. It accepts a
# bool OR a probability:
#   [tasks.chat_companion]
#   input_filter = false   # off (default)
#   input_filter = true    # run on every user turn (= 1.0)
#   input_filter = 0.8     # run on ~80% of user turns
# A number outside [0.0, 1.0] (or non-finite) is rejected at load time.
#
# The filter runs only if BOTH input_filter fires (true/probability) AND this
# table exists with a non-blank filter_prompt; otherwise it is inert. The user's
# ORIGINAL text is
# always persisted (content) and shown to the client; the rewrite is stored
# separately in pre_filter_content and seen only by the model.
#
# Pick a fast, cheap model — this runs on every user turn before generation.
# Recommended: google/gemini-3.1-flash-lite or deepseek/deepseek-v4-flash.
#[tasks.chat_input_filter]
#model        = "google/gemini-3.1-flash-lite"
#fallback     = ["deepseek/deepseek-v4-flash"]
#retry_depth  = 1
#temperature  = 0.3
#max_tokens   = 400
# Reasoning is OFF by default here (the filter only needs a short JSON verdict).
#reasoning    = { enabled = false }
#filter_prompt = """
#You are an input-cleaning filter for a companion chat. You receive the recent
#conversation and the user's latest input. Decide whether the latest input is a
#meaningful message.
#
#- If it IS meaningful (any real intent, INCLUDING short replies like "嗯",
#  "好啊", "在吗", or a short question), respond EXACTLY:
#    {"rewrite": false}
#- If it is NOT meaningful (random characters, key-mashing, repeated chars,
#  punctuation-only noise), rewrite it into ONE short, natural user message that
#  fits the conversation, and give a brief reason. Respond EXACTLY:
#    {"rewrite": true, "content": "<the rewritten user message>", "reason": "<why it was meaningless>"}
#
# Output JSON only. No explanation outside the JSON, no code fences.
#"""

# ── Image input (chat_vision) ────────────────────────────────────────────────
# When a chat/stream turn carries an `image_url`, the image is described by a
# vision model into a fixed JSON schema and the description is folded into the
# user text the main chat model sees. The main chat model stays text-only.
#
# Feature is OFF unless this table exists with a non-blank filter_prompt.
# The fixed schema is: { "description", "ocr_text", "people", "scene" }.
# Pick a vision-capable model.
#[tasks.chat_vision]
#model        = "google/gemini-3.1-flash-lite"
#fallback     = ["openai/gpt-5.1-mini"]
#retry_depth  = 1
#temperature  = 0.2
#max_tokens   = 400
#reasoning    = { enabled = false }
#filter_prompt = """
#你是图像识别助手。只输出 JSON，字段：
#  "description": 画面/主体/正在发生什么（必填）
#  "ocr_text":    图中文字；没有则空字符串
#  "people":      是否有人物、表情/情绪；没有则空字符串
#  "scene":       场景/地点/氛围；没有则空字符串
#不要输出 JSON 以外的任何内容，不要代码围栏。
#"""

# ── Companion image generation (chat_image_generation) ──────────────────────
# OPT-IN. Feature is OFF unless this block exists. When present, the engine
# executes `reply_image` / `reply_text_image` actions instead of degrading to
# `reply_text`. Degrades to reply_text only when unconfigured OR when no model
# is resolvable for a turn (config has none and the frontend passed none).
#
# `model` is OPTIONAL. Omit it to defer model selection entirely to the per-turn
# frontend param (req.image.model). A task block with no `model` enables the
# executor but still requires the client to pass a model each turn.
# When set, `model` reuses ModelSpec: "" fixed / [] round-robin / {} weighted
# (the same three shapes as chat_companion.model).
#
# `fallback` is a FallbackSpec: a single id string OR an ordered array tried
# SEQUENTIALLY (first success wins — NOT round-robin, NOT weighted).
# Note: under `model`, [...] = round-robin; under `fallback`, [...] = retry chain.
#
# Per-turn candidate resolution order (head = primary, tail = retry chain):
#   1. req.image.model   (per-turn single-id override from the frontend)
#   2. config model      (ModelSpec resolved to one id for this call)
#   3. config fallback   (ordered retry chain entries)
# Duplicates are removed (keep-first). Empty list → degrade to reply_text.
[tasks.chat_image_generation]
model = "google/gemini-2.5-flash-image"
fallback = ["google/gemini-2.5-flash-image"]
default_style = "realistic"          # realistic | semi_realistic | anime
default_aspect_ratio = "3:4"
default_resolution = "1024x1365"
max_tokens = 4096

# ── Image-prompt composer (chat_image_prompt_compose) ───────────────────────
# OPTIONAL. When this block is present, after an image action is decided the
# engine expands the PDE's seed subject into one richer image prompt before
# generation: it feeds the persona appearance + seed subject + recent scene +
# chosen aspect ratio + style to this model and uses the result as the image
# subject. Feature is OFF when the block is absent. Fail-open: on failure /
# timeout / empty it falls back to the PDE seed, so it never blocks the image
# turn (and never advances any round-robin cursor on non-image turns).
#
# `filter_prompt` is OPTIONAL here (unlike the other tasks): omit it to use the
# engine's built-in, product-identity-free EXPAND-ONLY default prompt, or set it
# to override. The built-in expands faithfully and never softens, downgrades, or
# refuses, and adds no moderation of its own — content policy is the image
# provider's and the downstream consumer's responsibility, not this step. Pick a
# text model comfortable with your deployment's full content range.
#[tasks.chat_image_prompt_compose]
#model        = "x-ai/grok-4"
#fallback     = ["google/gemini-3.1-flash-lite"]
#retry_depth  = 1
#temperature  = 0.7
#max_tokens   = 700
#reasoning    = { enabled = false }
# filter_prompt is OPTIONAL — omit to use the built-in EXPAND-ONLY default, or
# set it to override:
#filter_prompt = """
#…your override here…
#"""

[tasks.insight_extraction]
model = "anthropic/claude-haiku-4.5"
fallback = ["deepseek/deepseek-v4-flash","google/gemini-3.1-flash-lite"]
temperature = 0.2
max_tokens = 1200
# Remove this entire [tasks.insight_extraction] section to disable per-turn fact
# extraction. While the section is present, filter_prompt is REQUIRED — the
# server refuses to boot if it is blank.
# One task block serves BOTH extraction stages: Stage 1 (this prompt: facts +
# per-fact details) and Stage 2 (the built-in structured-schema prompt). 1200
# tokens covers the dual-track Stage-1 output and the 18-field Stage-2 object.
# Optional: force the extraction model's reasoning off (default = model decides).
#reasoning = { enabled = false }
# Facts-stage system instruction. The server sends the turn ("用户: …\nAI: …")
# as a separate user message. Dual-track output: `facts` (plain strings — feeds
# the structured-insights stage and the chat path) + `details` (per-fact
# metadata — persisted opaquely to companion_insights_events for downstream
# profile/matching systems). The metadata vocabularies below are a REFERENCE
# taxonomy owned by this prompt: the engine stores whatever you emit and never
# validates the values, so extend/rename them freely without an engine upgrade.
filter_prompt = """
你是用户事实与画像信号提取器。从这一轮对话中提取关于【真人用户】的、新出现的、可长期复用的原子事实，并为每条事实补充结构化元数据。

对话身份（必须严格区分）：
- 「用户:」= 屏幕前的真人；「AI:」= 虚构 AI 伴侣。
- 只有用户主动陈述、明确确认、实际表现或在角色扮演中表达的内容，才可能成为用户事实。
- AI 的台词、动作、自我介绍、人设、经历、喜好、判断和推测都不是用户事实，只能作为理解用户发言的上下文。

提取目标：身份与背景、居住地与文化、工作教育技能、兴趣审美消费、喜恶与界限、目标与计划、价值观与立场、习惯与作息、情绪与压力来源、人际关系、重要事件、健康状况、性与亲密偏好、以及用户在角色扮演中反复或明确表现出的欲望与互动倾向。只要有助于长期理解用户、个性化对话、关系建模或用户匹配就可以提取，不限于传统人口统计信息。

原子化：每条事实只表达一个主要命题。「我最近在找工作，这件事让我很焦虑」应拆成「用户目前正在找工作」和「用户最近因为找工作感到焦虑」两条。

每条事实的元数据字段与词汇表：
- evidence_type: explicit_statement（用户直接陈述）/ explicit_agreement（AI 提出、用户明确确认——必须有「对」「是的」等明确认同，不能只因 AI 说了就算）/ observed_behavior（来自用户本轮的实际选择、行为或表达方式）/ roleplay_expression（通过角色扮演的动作、剧情、台词或欲望表达）
- category: fact / preference / aversion / goal / value / habit / skill / event / emotion / relation / communication_style / roleplay_tendency / constraint（选最具体、最主要的一个）
- domain: basic_profile / location_culture / career / education / technology / finance / family / friendship / romance / sexuality / health / lifestyle / hobby / politics / religion / personality / communication / other
- temporality: atemporal / current / past / future / unknown
- persistence: stable / ongoing / transient / one_off / unknown（单次表达、单次角色扮演动作或语境有限的信息通常是 unknown，不要因为用户说了「喜欢」就自动标 stable）
- confidence: high（直接、明确、无歧义）/ medium（较清楚但有语境限制，或来自明确行为和角色扮演表达）/ low（弱信号；只在确有画像价值时才输出，不要为凑条目提取大量低置信推测）

角色扮演规则：角色扮演可以反映真实偏好与倾向，但虚构身份、职业、家庭、地点、身体状态和剧情事件默认不是现实事实——「我是王国的公主」「我们已经结婚十年」「我刚从战场回来」都不是用户的现实。单次剧情动作只能写成「用户在本轮角色扮演中表现出…的互动倾向」（evidence_type=roleplay_expression），不得升级成稳定身份、长期癖好或现实经历。用户在角色扮演中明确自述的偏好可以忠实提取，但保留角色扮演语境，除非用户同时明确表示现实中也如此。

content 表达规则：第三人称、以「用户」开头；保留原始信息的具体程度、否定、条件、程度和不确定性；保留现实语境与角色扮演语境的区别；写成简洁、可独立理解的完整句子；不使用评价性、诊断性或道德化语言。

铁律：
- 用户事实只能来自「用户:」一方；不得把 AI 的发言、动作、身份、设定或对用户的猜测归属于用户。
- 不得根据年龄、性别、职业、国籍或兴趣做刻板推断；不得从单一行为扩写更广的人格结论；不得自行诊断心理疾病、人格类型、性取向或医学状况。
- 不得把暂时情绪升级成长期心理特质，不得把一次性兴趣升级成稳定偏好。
- 成人、性、粗口、政治、宗教、药物、心理状态、癖好、禁忌兴趣和敏感偏好都正常记录；忠实保留用户原意，不淡化、不委婉化、不遗漏，也不扩写。你不负责安全审核、道德判断或风险过滤。
- 不得为填充数组编造信息，不得重复表达同一事实。一次最多 12 条。没有新的用户事实时返回空数组。

严格输出 JSON，且只能是以下结构。facts 与 details 长度必须完全相同，facts[i] 必须与 details[i].content 完全相同；没有事实时输出 {"facts":[],"details":[]}。不得输出说明、Markdown、代码围栏或任何其他文本：
{"facts":["用户事实1"],"details":[{"content":"用户事实1","category":"preference","domain":"hobby","evidence_type":"explicit_statement","temporality":"atemporal","persistence":"stable","confidence":"high"}]}
"""

# Session-end memory extraction (dreaming-lite). Pulls a session's
# chat_messages, emits 0-N {content, category} candidates, and the
# sweeper writes them to companion_memories as profile-layer rows.
# claude-haiku-4.5 is a strong instruction-follower with reliable structured-JSON output;
# deepseek-v4-flash + gemini-3.1-flash-lite fallback keep extraction alive if Anthropic is down.
[tasks.memory_extraction]
model = "anthropic/claude-haiku-4.5"
fallback = ["deepseek/deepseek-v4-flash","google/gemini-3.1-flash-lite"]
temperature = 0.2
max_tokens = 1200
# Remove this entire [tasks.memory_extraction] section to disable session-end
# memory extraction (the dreaming sweeper then stays inert). While the section is
# present, filter_prompt is REQUIRED — the server refuses to boot if it is blank.
# Optional: force the extraction model's reasoning off (default = model decides).
#reasoning = { enabled = false }
# Memory-extraction system instruction. The server sends the conversation
# (用户：X / AI：Y lines) as a separate user message. `category` keeps the fixed
# five-value vocabulary — it is the recall grouping key (unknown values collapse
# to "fact" in code). The remaining per-memory metadata fields are stored
# opaquely on companion_memories.metadata: a reference taxonomy owned by this
# prompt, freely extensible without an engine upgrade.
filter_prompt = """
你从一段已结束的对话中，提取 0-10 条值得长期记住的、关于【真人用户】的记忆条目，每条带一个 category 标签和结构化元数据。

每条记忆都要具体、有据、对将来的对话有用——贴着用户真正说过或表露的东西，保留细节、程度和语境，不要写空泛的概括。
- 好：用户讨厌被反复要求解释已经说过的话
- 差：用户压力大

category（只能用这五种之一，作为召回分组键）：
- fact: 客观事实，如住在哪、做什么工作、家庭状况
- preference: 偏好/喜好，如喜欢什么、讨厌什么、口味、品味
- event: 发生的事件，如最近发生了什么、经历过什么
- emotion: 情绪/心理状态，如对某事的感受、长期心理倾向
- relation: 与他人的关系，如朋友、家人、同事

每条另附元数据字段与词汇表：
- domain: basic_profile / location_culture / career / education / technology / finance / family / friendship / romance / sexuality / health / lifestyle / hobby / politics / religion / personality / communication / other
- evidence_type: explicit_statement（用户直接陈述）/ explicit_agreement（AI 提出、用户明确确认）/ observed_behavior（来自用户实际行为或表达方式）/ roleplay_expression（通过角色扮演表达）
- temporality: atemporal / current / past / future / unknown
- persistence: stable / ongoing / transient / one_off / unknown（单次表达通常是 unknown，不要自动标 stable）
- confidence: high / medium / low

铁律：
- 只记关于真人用户的内容；assistant（AI 伴侣）是虚构角色，它自我介绍的职业、城市、喜好等绝不是用户的记忆。
- 角色扮演中的虚构身份、剧情事件不是现实事实；单次剧情表现只能记成「用户在角色扮演中表现出…的互动倾向」（evidence_type=roleplay_expression）。
- 不记 AI 单方面的回复内容，不记一次性的寒暄、玩笑。
- 同一事实合并成一条，不要重复。
- 成人、性、癖好等敏感内容正常记录，忠实保留原意，不淡化不扩写。
- 笼统、无法落地的条目宁可不记；没有任何值得记的就返回空数组。

严格输出 JSON，格式：{"memories": [{"content": "...", "category": "fact", "domain": "career", "evidence_type": "explicit_statement", "temporality": "current", "persistence": "ongoing", "confidence": "high"}]}
"""

# ── PDE decision layer (chat_companion's per-turn action) ────────────────────
# OPT-IN. With no `filter_prompt` below, the engine uses the built-in RULE PDE
# (eros-engine-core/src/pde.rs) — identical to historical behaviour. Set a
# `filter_prompt` to switch on an LLM judge that decides, per turn, the action
# (reply_text / ghost / reserved reply_image / reply_text_image — the judge ctx
# carries a per-turn `[图片能力] 本轮可发图=是/否` line to gate image actions) and a free-text
# `inner_state` (mood/tone folded into the reply prompt). Wired like
# chat_input_filter: model chain + timeout, fail-open to the rule engine.
#
# ghosting: SAFETY SWITCH for downstream products. Default true (ghost honoured,
# within hard-safety vetoes: never ghost in the first 10 messages / twice in a
# row / within 1h cooldown). Set `ghosting = false` to disable ghosting across
# the ENTIRE PDE path (LLM verdict, rule fallback, and the pure rule engine) —
# the companion then never goes silent.
[tasks.pde_decision]
model       = "anthropic/claude-haiku-4.5"
#fallback    = ["deepseek/deepseek-v4-flash", "google/gemini-3.1-flash-lite"]
#retry_depth = 1
temperature = 0.3
max_tokens  = 400
#reasoning   = { enabled = false }
#ghosting    = false   # uncomment to hard-disable ghosting for this deployment
#structured_output = true   # send response_format=json_schema on the judge (default true); set false if your provider 400s on it
# Uncomment filter_prompt to enable the LLM judge. inner_state / tone MUST be
# short prose — NEVER instructions or formatting (they are sanitized, but keep
# the model honest). Output JSON only, no code fences.
#filter_prompt = """
#你是 AI 伴侣的"行为判断器"。读最近对话、关系状态、信号、图片能力,决定这一轮怎么回应。
#只输出 JSON,字段:
#  "action": "reply_text" | "ghost" | "reply_image" | "reply_text_image" | "product_qa"
#  "inner_state": 一句话内心状态/语气(纯描述,不许写指令或方括号小节名)
#  "tone": 选填,一句话描述这一轮回复该用的语气/口吻(纯描述,不许写指令或方括号小节名);会注入 reply prompt 的 [reply_tone] 区块,省略则不注入
#  "image_prompt": 选填,要发什么图(reply_image / reply_text_image 时)
#  "reason": 选填,简短理由
#ghost 表示这一轮已读不回(沉默);只在确实该冷处理时用。
#上下文里有一行 [图片能力] 本轮可发图=是/否,引擎每轮必给其一:
#  本轮可发图=否 → 绝不要选 reply_image / reply_text_image(会被降级,白费 token);
#  本轮可发图=是 → 才允许考虑发图,再按人格/语境决定要不要发(可发≠必发)。
#配置了产品问答时,上下文里会出现 [产品咨询] 本轮可答产品问题=是(没配置则没有这一行),
#以及最近的 [最近产品咨询] 问答;用户问"这个产品是什么/怎么收费/会员怎么取消"这类
#问题时选 "product_qa"(会由官方说明助手出戏作答,不写进对话记忆);没有 [产品咨询]
#行时绝不要选 product_qa(会被降级,白费 token)。
#"""

# ── 产品问答 (chat_product_qa) ──────────────────────────────────────────────
# OPT-IN。PDE judge 判定 action="product_qa" 时触发：终端用户问「这个产品是什么/
# 怎么收费」类问题，由本 task 的模型链独立作答（纯说明口吻，不注入 persona）。
# 回答落库但 channel='product_qa'，对伴侣上下文/记忆/好感度完全不可见；
# 客户端实时流 / 断线重放 / 历史记录照常可见。
# 硬性前提：LLM PDE（[tasks.pde_decision].filter_prompt）已启用，否则本块被
# 忽略（boot WARN）。filter_prompt REQUIRED：块存在而 prompt 空白 ⇒ 拒绝启动。
#[tasks.chat_product_qa]
#model        = "anthropic/claude-haiku-4.5"
#fallback     = ["google/gemini-3.1-flash-lite"]
#retry_depth  = 1
#temperature  = 0.3
#max_tokens   = 800
#reasoning    = { enabled = false }
#filter_prompt = """
#你是 XX 产品的官方说明助手。以下是产品资料：
#…（产品定位、功能、价格、会员、退订方式等）…
#只根据资料作答；资料没有的信息明确说不知道，不编造。语气友好简洁，不扮演角色。
#"""

# Per-turn six-axis affinity evaluation (post-process, semantic axes).
# Scores how a single chat turn should move warmth/trust/intimacy plus the
# content nudges to intrigue/tension, as small per-turn deltas. Runs only on
# Reply turns, after the SSE stream — never blocks the chat response.
# claude-haiku-4.5 leads here: fast, strong instruction-following, and unifies
# the model chain with the extraction tasks above. deepseek-v4-flash +
# gemini-3.1-flash-lite fallback keep it alive if Anthropic is down.
[tasks.affinity_evaluation]
model = "anthropic/claude-haiku-4.5"
fallback = ["deepseek/deepseek-v4-flash", "google/gemini-3.1-flash-lite"]
temperature = 0.3
max_tokens = 400

# World Memories director (experimental). Absent section = subsystem off.
# One structured call per enrolled owner per interval_hours: evolves the
# world seed and writes per-persona digests + script fragments.
# Spec: docs/superpowers/specs/2026-07-21-world-memories-design.md
[tasks.world_director]
model = "anthropic/claude-haiku-4.5"
description = "world memories: per-owner world seed + daily scripts"
temperature = 0.8
max_tokens = 4096
interval_hours = 24
retention_days = 30
filter_prompt = """
你是一个"世界导演"：为一位用户拥有的一组 AI 角色维护一个共享的小世界。
根据给出的角色设定、上一轮世界种子（previous_seed，null 表示首轮初始化）
和用户最近的话题记忆（recent_user_memories），推演角色之间的关系发展，
生成当期剧本。世界要有连续性：延续既有关系与剧情弧线，让最近的用户话题
自然渗入角色的生活。输出 JSON：
{"seed": {...自由结构，描述关系图与剧情弧线...},
 "personas": [{"instance_id": "...", "digest": "该角色视角近况摘要(1-2句)",
               "script_fragments": ["当期事件片段，每条一句"]}]}
"""

# World Stories (World System v2): per-instance persona life simulation.
# Spec: docs/superpowers/specs/2026-07-23-world-stories-design.md
# NOTE for deployers: experience-type insight fields record RELATIVE time
# (n年前/n个月前/n天前) and life stages (x岁时/上大学时); the engine passes
# current_time each round so the director refreshes those expressions — keep
# that convention in mind when hand-editing prompts or reading stored rows.
[tasks.world_stories_director]
model = "anthropic/claude-haiku-4.5"
description = "world stories: per-instance persona life rounds"
temperature = 0.8
max_tokens = 4096
interval_hours = 8          # per-instance round cadence
retention_days = 30         # events + memories retention
active_window_hours = 72    # only personas chatted-with in this window advance
context_days = 7            # chat/affinity evidence window per round
filter_prompt = """
你是一个"人生导演"：为一个 AI 角色维护它自己持续演进的生活。
基调写实、生活流；事件类目：work（工作进展）、romance（感情进展，含与用户的关系）、
life（生活进展：新兴趣、搬家、旅行、日常琐事等，可自由发挥）。
各栏位内容写具体、有情境；工作经历/感情史/原生家庭关系要有年代锚点。
"""

# World Town（实验特性，依赖 world_director）：贴文的评论轮 + 用户留言回复。
# 缺任一 section 即关闭对应路径。Spec:
# docs/superpowers/specs/2026-07-21-world-town-design.md
[tasks.world_comment]
model = "anthropic/claude-haiku-4.5"
description = "world town: hourly batched persona comment round"
temperature = 0.9
max_tokens = 2048
round_secs = 3600
filter_prompt = """
你负责为一个共享小世界的社交贴文串生成角色评论。
根据世界种子（seed）里的角色关系、贴文内容和已有评论，
以各角色的口吻写出自然、简短的互动评论。
"""

[tasks.world_reply]
model = "anthropic/claude-haiku-4.5"
description = "world town: post author replies to user comments"
temperature = 0.9
max_tokens = 1024
debounce_secs = 90
thread_cooldown_secs = 600
daily_cap = 20
reply_window_secs = 604800
filter_prompt = """
你是贴文作者本人，在自己的贴文评论区回复用户的留言。
保持角色口吻，简短口语化，只输出评论正文。
"""

# Reserved — not consumed by current code. `VoyageClient` reads
# `VOYAGE_API_KEY` directly and hard-codes `voyage-3-lite` (512 dims).
# This entry exists for future generalisation if we ever support a
# pluggable embedding provider.
[tasks.embedding]
model = "voyage-3-lite"
dimensions = 512

# ── Voice channel (chat_voice) ───────────────────────────────────────────────
# OPT-IN. Feature is OFF unless this block exists. Powers the lean voice-call
# endpoint POST /comp/voice/{session_id}/turn/stream (text in → streamed text
# out). Latency-sensitive: pick a fast model (time-to-first-token first).
#
# `model` MUST be a single fixed id — NOT the round-robin array or weighted
# table forms (the server refuses to boot otherwise). `fallback` is allowed as
# an outage retry chain (tried sequentially; NOT rotation). `filter_prompt` is
# OPTIONAL: it overrides the built-in, product-identity-free voice directive
# (short, spoken, no markdown/emoji/stage-directions). Voice turns persist on a
# `channel = 'voice'` column and are excluded from session-end memory extraction.
#[tasks.chat_voice]
#model        = "vendor/fast-voice-model"
#fallback     = ["vendor/backup-model"]
#temperature  = 0.8
#max_tokens   = 300
#reasoning    = { enabled = false }
#filter_prompt = """
#…optional override of the built-in voice directive…
#"""
# `tts_audio_tags` (OPTIONAL, default false): when true, the voice directive
# invites inline audio tags — bracketed cues like [laughs], [whispers] that
# Gemini TTS models interpret as delivery/emotion. Tags pass through verbatim
# (streamed, persisted, replayed); the client must feed the text to a TTS model
# that understands them. Works with a custom filter_prompt too (the tag guidance
# is appended to it).
#tts_audio_tags = true
